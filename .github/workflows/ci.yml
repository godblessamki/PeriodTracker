name: .NET Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore PeriodTracker.Backend.sln

    - name: Build
      run: dotnet build PeriodTracker.Backend.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test PeriodTracker.Backend.sln --no-build --verbosity normal --configuration Release
